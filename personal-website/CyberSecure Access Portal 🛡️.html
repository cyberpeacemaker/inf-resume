<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecure Access Portal 🛡️</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    
</head>

<body>
    <main class="relative min-h-screen w-full bg-[#0f0f0f] flex items-center justify-center p-4 overflow-hidden">
  <canvas id="matrix-canvas" class="absolute top-0 left-0 w-full h-full z-0"></canvas>

  <div class="relative z-10 w-full max-w-md bg-black/30 backdrop-blur-lg rounded-2xl shadow-2xl shadow-purple-500/10 border border-white/10">
    <div class="p-8 md:p-12 text-white">
      <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-[#667eea] to-[#764ba2]">Secure Access Gateway</h1>
        <p class="text-gray-400 mt-2">Authenticate to access the system</p>
      </div>

      <form class="space-y-6">
        <div class="relative">
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
            <iconify-icon icon="mdi:email-outline" class="text-gray-400"></iconify-icon>
          </div>
          <input type="email" name="email" id="email" class="bg-gray-900/50 border border-gray-700 text-white text-sm rounded-lg focus:ring-[#764ba2] focus:border-[#764ba2] block w-full pl-10 p-3 placeholder-gray-500 transition-all duration-300" placeholder="user@domain.com" required>
        </div>

        <div class="relative">
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
            <iconify-icon icon="mdi:lock-outline" class="text-gray-400"></iconify-icon>
          </div>
          <input type="password" name="password" id="password" class="bg-gray-900/50 border border-gray-700 text-white text-sm rounded-lg focus:ring-[#764ba2] focus:border-[#764ba2] block w-full pl-10 p-3 placeholder-gray-500 transition-all duration-300" placeholder="••••••••" required>
           <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-white">
              <iconify-icon id="eye-icon" icon="mdi:eye-outline"></iconify-icon>
           </button>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-start">
            <div class="flex items-center h-5">
              <input id="remember" aria-describedby="remember" type="checkbox" class="w-4 h-4 border border-gray-600 rounded bg-gray-800 focus:ring-3 focus:ring-[#667eea] accent-[#764ba2]">
            </div>
            <div class="ml-3 text-sm">
              <label for="remember" class="text-gray-400">Remember me</label>
            </div>
          </div>
          <a href="#" class="text-sm font-medium text-[#764ba2] hover:underline">Forgot password?</a>
        </div>

        <button type="submit" class="w-full text-white bg-gradient-to-r from-[#667eea] to-[#764ba2] hover:opacity-90 focus:ring-4 focus:outline-none focus:ring-purple-300/50 font-semibold rounded-lg text-sm px-5 py-3 text-center transition-all duration-300 shadow-lg shadow-[#667eea]/20 transform hover:scale-105">
          LOGIN
        </button>

        <p class="text-sm font-light text-gray-400 text-center">
          Don’t have an account? <a href="#" class="font-medium text-[#764ba2] hover:underline">Register here</a>
        </p>
      </form>
       <div class="text-center mt-8">
          <p class="text-xs text-gray-500 copyright-year">&copy; 2024 CyberCorp. All rights reserved.</p>
       </div>
    </div>
  </div>
</main>
</body>
 
 <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<script>
  // Password Visibility Toggle
  const togglePassword = document.getElementById('togglePassword');
  const password = document.getElementById('password');
  const eyeIcon = document.getElementById('eye-icon');

  togglePassword.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    eyeIcon.setAttribute('icon', type === 'password' ? 'mdi:eye-outline' : 'mdi:eye-off-outline');
  });

  // Dynamic Copyright Year
  document.querySelector('.copyright-year').textContent = `© ${new Date().getFullYear()} CyberCorp. All rights reserved.`;

  // Matrix Rain Animation
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');

  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;
  let cols = Math.floor(w / 20) + 1;
  let ypos = Array(cols).fill(0);

  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, w, h);

  function matrix() {
    ctx.fillStyle = '#0f0f0f1a';
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = '#667eea'; // Matrix text color
    ctx.font = '15pt monospace';

    ypos.forEach((y, ind) => {
      const text = String.fromCharCode(Math.random() * 128);
      const x = ind * 20;
      ctx.fillText(text, x, y);

      if (y > 100 + Math.random() * 10000) {
        ypos[ind] = 0;
      } else {
        ypos[ind] = y + 20;
      }
    });
  }

  setInterval(matrix, 50);

  window.addEventListener('resize', () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    cols = Math.floor(w / 20) + 1;
    ypos = Array(cols).fill(0);
    ctx.fillStyle = '#0f0f0f';
    ctx.fillRect(0, 0, w, h);
  });

</script>
</html>
